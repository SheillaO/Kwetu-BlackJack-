<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Kwetu Blackjack - African Card Game</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="city-selector">
        <p>🌍 Playing from: <span id="city-el">Nairobi</span></p>
        <button onclick="changeCity()" class="city-btn">CHANGE CITY</button>
    </div>

    <h1>Kwetu Blackjack</h1>
    <p class="tagline">Play 21 the African Way</p>

    <p id="message-el">Want to play a round?</p>
    <p id="cards-el">Cards:</p>
    <p id="sum-el">Sum:</p>

    <button onclick="placeBet()">PLACE BET</button>
    <button onclick="startGame()">START GAME</button>
    <button onclick="newCard()">NEW CARD</button>

    <p id="player-el"></p>

    <div class="stats">
        <p>Current Bet: $<span id="bet-el" class="stat-number">10</span></p>
        <p>Wins: <span id="wins-el" class="stat-number">0</span> | Losses: <span id="losses-el"
                class="stat-number">0</span></p>
    </div>

    <div class="info-box">
        <p><strong>Kwetu</strong> means "home" in Swahili. Play blackjack across African cities!</p>
        <p>🎴 Goal: Get as close to 21 without going over</p>
    </div>

    <script src="index.js"></script>
</body>

</html>
